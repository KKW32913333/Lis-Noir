<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lis Noir - CARD BATTLE</title>
<meta name="theme-color" content="#3d2a5c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#3d2a5c;
    --bg-panel:#2a1f42;
    --bg-panel2:#382a52;
    --gold:#E0A83F;
    --gold-bright:#FFCF6B;
    --gold-soft:#FFCF6B40;
    --purple:#9b7fd4;
    --wine:#d1487a;
    --cyan:#5fd4c9;
    --text:#f5f0ff;
    --text-panel:#f5f0ff;
    --text-dim:#b3a3d9;
    --text-dim-panel:#b3a3d9;
    --hp-red:#ff6b8a;
    --hairline:#4a3a70;
    --hairline-panel:#4a3a70;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg-deep); color:var(--text);
    font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif; overflow:hidden;}
  .cg-brand{font-family:"Cinzel","Noto Serif JP",serif;}
  #app{position:relative; width:100%; height:100vh; height:100dvh; max-width:640px; margin:0 auto;
    background:
      radial-gradient(circle at 15% 8%, #7a4fae4d 0%, transparent 45%),
      radial-gradient(circle at 88% 92%, #d1487a3d 0%, transparent 50%),
      linear-gradient(160deg, #4a2f6b 0%, #3d2a5c 45%, #4a2547 100%);
    overflow:hidden; box-shadow:0 0 60px #00000055;}

  .cg-screen{position:absolute; inset:0; display:none; flex-direction:column; overflow-y:auto; overflow-x:hidden;}
  .cg-screen.active{display:flex;}

  /* ---------- Top status bar ---------- */
  .cg-topbar{display:flex; align-items:center; justify-content:space-between; padding:10px 14px;
    background:linear-gradient(180deg,var(--bg-panel2),var(--bg-panel)); border-bottom:1px solid var(--hairline-panel); flex-shrink:0;
    color:var(--text-panel); box-shadow:0 2px 10px #00000033;}
  .cg-player-info{display:flex; align-items:center; gap:8px; min-width:0;}
  .cg-avatar{width:36px; height:36px; border-radius:50%; background:linear-gradient(145deg,var(--purple),#5c3a8a);
    display:flex; align-items:center; justify-content:center; font-size:16px; border:2px solid var(--gold-bright); flex-shrink:0;
    box-shadow:0 2px 6px #00000044;}
  .cg-player-name{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cg-player-level{font-size:11px; color:var(--text-dim-panel);}
  .cg-currency-group{display:flex; gap:6px; font-size:11px; flex-shrink:0;}
  .cg-currency{display:flex; align-items:center; gap:3px; background:var(--bg-panel2); border:1px solid var(--hairline-panel); padding:4px 8px; border-radius:20px; white-space:nowrap; box-shadow:0 1px 4px #00000033;}

  /* ---------- Home ---------- */
  .cg-hero{margin:14px; height:260px; border-radius:18px; position:relative; overflow:hidden;
    background:
      linear-gradient(180deg, transparent 40%, #1f1533ee 92%),
      url('hero-bg.jpg');
    background-size:cover; background-position:center 22%;
    border:1px solid var(--hairline); box-shadow: inset 0 0 50px #00000099, 0 6px 18px #00000044;}
  .cg-hero::after{content:''; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, #1f153355 0%, transparent 25%, transparent 65%, #1f1533cc 100%);}
  .cg-hero-title{position:absolute; bottom:14px; left:16px; right:16px; font-size:15px; color:var(--gold-bright);
    letter-spacing:3px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;}
  .cg-hero-title.cg-brand{text-shadow:0 2px 10px #000, 0 0 16px #ffd98a99;}

  .cg-progress-row{display:flex; gap:10px; margin:0 14px 14px;}
  .cg-progress-card{flex:1; background:var(--bg-panel); border:1px solid var(--hairline-panel); border-radius:12px; padding:8px 10px; box-shadow:0 2px 8px #00000033;}
  .cg-progress-label{font-size:10px; color:var(--text-dim-panel); display:flex; justify-content:space-between; margin-bottom:4px;}
  .cg-progress-track{height:6px; background:#1c1530; border-radius:4px; overflow:hidden;}
  .cg-progress-fill{height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-bright));}
  .cg-progress-fill.cyan{background:linear-gradient(90deg,#3a9d92,var(--cyan));}

  /* ---------- Card component ---------- */
  .cg-card{position:relative; width:100%; aspect-ratio:3/4; border-radius:12px; overflow:hidden;
    background:var(--bg-panel2); border:2px solid var(--rarity-color, #666); cursor:pointer;
    display:flex; flex-direction:column; color:var(--text-panel); box-shadow:0 3px 10px #00000040;}
  .cg-card-sm{font-size:10px;}
  .cg-card-cost{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#1a1330cc; border:1px solid var(--gold-bright); color:var(--text-panel); font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center; z-index:2;}
  .cg-card-art{flex:1; position:relative; overflow:hidden;}
  .cg-card-placeholder{width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:28px;}
  .cg-card-img{width:100%; height:100%; object-fit:cover;}
  .cg-card-name{font-size:10px; text-align:center; padding:2px 2px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cg-card-stats{display:flex; justify-content:space-between; padding:2px 5px 4px; font-size:10px;}
  .cg-card-stats .atk{color:#e0946a;}
  .cg-card-stats .hp{color:#9dc27f;}
  .cg-card-stats .spell{color:var(--purple);}
  .cg-card-stats .spell-val{color:var(--gold-bright);}
  .cg-card-stats .equip{color:var(--text-dim-panel);}
  .cg-card-stats .equip-val{color:var(--gold-bright);}
  .cg-card-el{position:absolute; top:3px; right:3px; font-size:12px; z-index:2;}

  /* ---------- Deck screen ---------- */
  .cg-section-title{font-size:13px; color:var(--gold); padding:12px 14px 6px; letter-spacing:1px;}
  .cg-deck-header{display:flex; justify-content:space-between; align-items:center; padding:0 14px;}
  #deck-slots{display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; padding:10px 14px;}
  #collection-list{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; padding:10px 14px 30px; flex:1;}
  .cg-coll-item.in-deck .cg-card{opacity:.35;}
  .cg-empty{grid-column:1/-1; text-align:center; color:var(--text-dim); font-size:12px; padding:20px;}

  .cg-segment{flex:1; display:flex; background:var(--bg-panel); border:1px solid var(--hairline-panel); border-radius:20px; padding:3px; margin-left:6px;}
  .cg-seg-btn{flex:1; border:none; background:none; color:var(--text-dim-panel); font-family:inherit; font-size:12px;
    padding:8px 4px; border-radius:16px; cursor:pointer;}
  .cg-seg-btn.active{background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#2a1a00; font-weight:700;}

  /* ---------- Card list / detail ---------- */
  #cardlist-grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; padding:14px; flex:1;}
  .cg-detail-art{width:140px; height:140px; margin:20px auto 10px; border-radius:14px; display:flex; align-items:center; justify-content:center; overflow:hidden; border:2px solid var(--gold);}
  .cg-detail-emoji{font-size:56px;}
  .cg-detail-art img{width:100%; height:100%; object-fit:cover;}
  .cg-detail-info{padding:0 20px; text-align:center;}
  .cg-detail-name{font-size:18px; font-weight:700;}
  .cg-detail-level{font-size:12px; color:var(--text-dim); margin:4px 0 8px;}
  .cg-detail-bar{height:6px; background:var(--hairline); border-radius:4px; overflow:hidden; margin-bottom:10px;}
  .cg-detail-bar-fill{height:100%; background:linear-gradient(90deg,var(--purple),#a98fd6);}
  .cg-detail-desc{font-size:12px; color:var(--text-dim); margin-bottom:8px;}
  .cg-detail-stats{display:flex; justify-content:center; gap:18px; margin:14px 0;}
  .cg-detail-stat{text-align:center; font-size:11px; color:var(--text-dim);}
  .cg-detail-stat b{display:block; font-size:16px; color:var(--text);}

  /* ---------- Buttons ---------- */
  .cg-btn{border:1px solid var(--hairline-panel); border-radius:20px; padding:10px 22px; font-size:13px; font-weight:700; cursor:pointer;
    background:var(--bg-panel2); color:var(--text-panel); transition:transform .1s;}
  .cg-btn:active{transform:scale(.96);}
  .cg-btn-main{background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#2a1a00; border-color:var(--gold-bright);
    box-shadow:0 3px 10px #e0a83f4d;}
  .cg-back-btn{background:none; border:none; color:var(--text); font-size:18px; cursor:pointer; padding:10px 14px;}
  .cg-top-row{display:flex; align-items:center; justify-content:space-between; padding:6px 4px;}

  /* ---------- Battle screen ---------- */
  .cg-battle-header{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; flex-shrink:0;}
  .cg-battle-header-left{display:flex; align-items:center; gap:6px;}
  .cg-battle-back-btn{padding:6px 8px; font-size:16px; flex-shrink:0;}
  .cg-hp-chip{display:flex; align-items:center; gap:6px; font-size:12px; background:var(--bg-panel2); border:1px solid var(--hairline-panel); padding:5px 10px; border-radius:16px; box-shadow:0 2px 6px #00000033;}
  .cg-hp-chip .val{font-weight:700; color:var(--hp-red);}
  .cg-timer{font-size:11px; color:var(--gold-bright); text-align:center; background:#00000033; padding:3px 12px; border-radius:12px; letter-spacing:1px;}

  .cg-battle-board{flex:1; display:flex; flex-direction:column; justify-content:space-between; padding:6px 10px; position:relative;
    background:radial-gradient(ellipse 300px 200px at 50% 45%, #7a4fae22 0%, transparent 70%);}
  #battle-enemy-portrait{position:absolute; top:2px; right:14px; width:40px; height:40px; border-radius:50%;
    background:linear-gradient(145deg,#4a1a30,#1f1533); border:2px solid var(--hp-red); display:flex; align-items:center;
    justify-content:center; font-size:18px; cursor:pointer; z-index:3; box-shadow:0 0 12px #d1487a55;}

  .cg-field-row{display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:6px; padding:4px 0;}
  .cg-field-slot{aspect-ratio:3/4; border:1px dashed var(--hairline); border-radius:10px; position:relative; background:#1f153322;}
  .cg-field-slot.filled{border-style:solid; border-color:#6b5590;}
  .cg-field-slot.selected{border-color:var(--gold); box-shadow:0 0 12px var(--gold-soft);}
  .cg-field-slot .cg-card{border-width:1px; height:100%;}
  .cg-hp-badge{position:absolute; bottom:2px; right:2px; background:#1a1330cc; color:#ff8a95; font-size:9px;
    padding:1px 4px; border-radius:6px; z-index:2;}
  .cg-ready-dot{position:absolute; top:2px; left:2px; width:6px; height:6px; border-radius:50%; background:#7ed957; z-index:2;
    box-shadow:0 0 6px #7ed957aa;}

  .cg-battle-mid{display:flex; align-items:center; justify-content:center; padding:6px 0; color:var(--text-dim); font-size:10px;}

  .cg-hand-row{display:flex; gap:6px; padding:8px 10px; overflow-x:auto;}
  .cg-hand-card{width:64px; flex-shrink:0; transition:transform .1s;}
  .cg-hand-card.disabled{opacity:.4;}
  .cg-hand-card.selected{transform:translateY(-8px);}

  .cg-battle-footer{display:flex; align-items:center; justify-content:space-between; padding:8px 14px 14px; flex-shrink:0;}
  .cg-cost-track{flex:1; height:10px; background:#1c1530; border-radius:6px; overflow:hidden; margin-right:10px; border:1px solid var(--hairline);}
  .cg-cost-fill{height:100%; background:linear-gradient(90deg,var(--purple),var(--cyan));}
  .cg-cost-label{font-size:11px; color:var(--text-dim); margin-right:8px; white-space:nowrap;}

  #battle-skill-flash{position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(.7); opacity:0;
    text-align:center; font-size:17px; font-weight:800; color:var(--gold-bright); text-shadow:0 0 18px #000, 0 0 8px #000;
    white-space:pre-line; z-index:10; pointer-events:none;}
  #battle-skill-flash.show{animation:skillPop 1.1s ease-out;}
  @keyframes skillPop{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.5);}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.1);}
    30%{transform:translate(-50%,-50%) scale(1);}
    75%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1);}
  }

  /* ---------- Result screen ---------- */
  .cg-result-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;}
  .cg-result-title{font-size:52px; font-weight:900; letter-spacing:4px;}
  .cg-result-title.win{color:var(--gold-bright); text-shadow:0 0 30px var(--gold-soft);}
  .cg-result-title.lose{color:var(--text-dim);}
  .cg-result-trophy{font-size:14px; color:var(--text-dim);}
  .cg-reward-row{display:flex; gap:20px; margin:10px 0;}
  .cg-reward-item{text-align:center; font-size:12px; color:var(--text-dim);}
  .cg-reward-item .n{display:block; font-size:16px; color:var(--gold-bright); font-weight:700;}
  .cg-result-actions{display:flex; gap:12px; margin-top:10px;}

  /* ---------- モバイル用セーフエリア／下部固定タブバー ---------- */
  .cg-topbar{padding-top:calc(10px + env(safe-area-inset-top));}
  .cg-scroll-pad{padding-bottom:calc(84px + env(safe-area-inset-bottom));}

  .cg-tabbar{position:absolute; left:0; right:0; bottom:0; z-index:20;
    display:flex; align-items:flex-start; justify-content:space-around;
    background:var(--bg-panel); border-top:1px solid var(--hairline-panel);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    transition:transform .2s ease, opacity .2s ease;}
  .cg-tabbar.hidden{transform:translateY(100%); opacity:0; pointer-events:none;}
  .cg-tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px;
    color:var(--text-dim-panel); cursor:pointer; min-height:44px; justify-content:center;}
  .cg-tab .ic{font-size:20px;}
  .cg-tab .lb{font-size:10px;}
  .cg-tab:active{opacity:.7;}
  .cg-tab-main{position:relative; margin-top:-26px;}
  .cg-tab-main-btn{width:52px; height:52px; border-radius:50%;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border:3px solid var(--bg-panel);
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px #00000033, 0 0 0 1px var(--gold-soft);}
  .cg-tab-main .lb{color:var(--gold-bright); font-weight:700; margin-top:1px;}
  .cg-tab-main .ic{font-size:22px;}

  /* ---------- ショップ ---------- */
  .cg-shop-currency{display:flex; gap:8px; padding:8px 14px 4px;}
  .cg-shop-packs{display:flex; flex-direction:column; gap:12px; padding:10px 14px 20px;}
  .cg-pack-card{display:flex; align-items:center; gap:12px; background:var(--bg-panel); border:1px solid var(--hairline-panel);
    border-radius:14px; padding:12px; color:var(--text-panel);}
  .cg-pack-icon{width:56px; height:56px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:26px; background:linear-gradient(160deg,var(--bg-panel2),#1c1530); border:1px solid var(--hairline-panel);}
  .cg-pack-info{flex:1; min-width:0;}
  .cg-pack-name{font-size:14px; font-weight:700; margin-bottom:2px;}
  .cg-pack-desc{font-size:11px; color:var(--text-dim-panel); line-height:1.5;}
  .cg-pack-buy{flex-shrink:0; padding:8px 14px; font-size:12px; white-space:nowrap;}
  .cg-pack-buy:disabled{opacity:.4; cursor:default;}

  /* ---------- パック開封演出 ---------- */
  .cg-reveal-overlay{position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
    flex-direction:column; background:#1a1330e6; opacity:1; transition:opacity .2s ease;}
  .cg-reveal-overlay.hidden{opacity:0; pointer-events:none;}
  .cg-reveal-inner{display:flex; flex-direction:column; align-items:center; gap:14px; padding:20px;}
  .cg-reveal-label{color:var(--gold-bright); font-size:13px; letter-spacing:4px;}
  .cg-reveal-card{width:150px; animation:revealPop .5s ease-out;}
  .cg-reveal-caption{color:var(--text-panel); font-size:13px; text-align:center;}
  @keyframes revealPop{
    0%{transform:scale(.4) rotateY(90deg); opacity:0;}
    60%{transform:scale(1.08) rotateY(0deg); opacity:1;}
    100%{transform:scale(1) rotateY(0deg);}
  }

  /* ---------- ミッション ---------- */
  .cg-mission-list{display:flex; flex-direction:column; gap:10px; padding:10px 14px 20px;}
  .cg-mission-card{background:var(--bg-panel); border:1px solid var(--hairline-panel); border-radius:14px; padding:12px 14px; color:var(--text-panel);}
  .cg-mission-card.done{border-color:var(--gold-bright);}
  .cg-mission-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px;}
  .cg-mission-title{font-size:13px; font-weight:700;}
  .cg-mission-desc{font-size:11px; color:var(--text-dim-panel); margin-top:2px;}
  .cg-mission-reward{font-size:11px; color:var(--gold-bright); white-space:nowrap; flex-shrink:0;}
  .cg-mission-bottom{display:flex; align-items:center; gap:10px;}
  .cg-mission-progress-track{flex:1; height:6px; background:#1c1530; border-radius:4px; overflow:hidden;}
  .cg-mission-progress-fill{height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-bright));}
  .cg-mission-progress-label{font-size:10px; color:var(--text-dim-panel); white-space:nowrap;}
  .cg-mission-claim{flex-shrink:0; padding:6px 14px; font-size:11px;}
  .cg-mission-claim:disabled{opacity:.35; cursor:default;}
  .cg-mission-claim.claimed{background:var(--bg-panel2); color:var(--text-dim-panel);}

  /* ---------- ステージ選択 ---------- */
  .cg-stage-list{display:flex; flex-direction:column; gap:10px; padding:10px 14px 20px;}
  .cg-stage-card{display:flex; align-items:center; gap:12px; background:var(--bg-panel); border:1px solid var(--hairline-panel);
    border-radius:14px; padding:12px; color:var(--text-panel); cursor:pointer; box-shadow:0 3px 10px #00000033; transition:transform .1s;}
  .cg-stage-card:active{transform:scale(.98);}
  .cg-stage-card.locked{opacity:.5; cursor:default;}
  .cg-stage-card.cleared{border-color:var(--gold);}
  .cg-stage-portrait{width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:24px; background:linear-gradient(160deg,var(--bg-panel2),#1a1330); border:2px solid var(--gold-bright);}
  .cg-stage-info{flex:1; min-width:0;}
  .cg-stage-name{font-size:13px; font-weight:700;}
  .cg-stage-desc{font-size:11px; color:var(--text-dim-panel); margin-top:2px;}
  .cg-stage-go{font-size:18px; flex-shrink:0;}

  /* ---------- ポートレートHUD / VS演出 ---------- */
  .cg-mini-portrait{width:26px; height:26px; border-radius:50%; background-image:url('hero-bg.jpg');
    background-size:cover; background-position:center 15%; border:2px solid var(--gold-bright); flex-shrink:0; box-shadow:0 2px 6px #00000044;}
  .cg-vs-intro{position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; gap:22px;
    background:#1a1330e6; opacity:1; transition:opacity .3s ease;}
  .cg-vs-intro.hidden{opacity:0; pointer-events:none;}
  .cg-vs-side{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .cg-vs-portrait{width:76px; height:76px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:34px;
    border:3px solid var(--gold-bright); box-shadow:0 0 20px var(--gold-soft);}
  .cg-vs-portrait.player{background:linear-gradient(160deg,var(--bg-panel2),#1a1330); background-image:url('hero-bg.jpg'); background-size:cover; background-position:center 15%; font-size:0;}
  .cg-vs-portrait.enemy{background:linear-gradient(145deg,#4a1a30,#1f1533); border-color:var(--hp-red); box-shadow:0 0 20px #d1487a55;}
  .cg-vs-name{font-size:12px; color:var(--text-panel); font-weight:700;}
  .cg-vs-mark{font-size:22px; color:var(--gold-bright); font-weight:900; font-family:"Cinzel",serif;}

  #turn-banner{position:absolute; top:36%; left:50%; transform:translate(-50%,-50%) scaleX(0); opacity:0;
    background:linear-gradient(90deg,transparent,#1a1330ee 20%,#1a1330ee 80%,transparent);
    color:var(--gold-bright); font-family:"Cinzel",serif; font-size:20px; font-weight:800; letter-spacing:4px;
    padding:10px 0; width:100%; text-align:center; z-index:15; pointer-events:none;}
  #turn-banner.show{animation:turnBannerSweep 1.1s ease-out;}
  @keyframes turnBannerSweep{
    0%{opacity:0; transform:translate(-50%,-50%) scaleX(0);}
    20%{opacity:1; transform:translate(-50%,-50%) scaleX(1);}
    75%{opacity:1; transform:translate(-50%,-50%) scaleX(1);}
    100%{opacity:0; transform:translate(-50%,-50%) scaleX(1);}
  }

  .cg-preview-badge{position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:#1a1330ee;
    color:var(--gold-bright); font-size:10px; font-weight:700; padding:2px 6px; border-radius:8px; z-index:5;
    border:1px solid var(--gold-bright); white-space:nowrap;}
  .cg-preview-badge.adv{color:#7ed957; border-color:#7ed957;}
  .cg-preview-badge.dis{color:#ff8a95; border-color:#ff8a95;}
  .cg-preview-badge.spell{color:var(--cyan); border-color:var(--cyan);}
  #battle-portrait-preview{position:static; display:none; transform:none; margin-left:4px; top:auto;}
  #battle-portrait-preview.show{display:inline-block;}

  #battle-impact-flash{position:absolute; inset:0; z-index:8; background:#ff6b8a00; pointer-events:none; opacity:0;}
  #battle-impact-flash.show{animation:impactFlash .3s ease-out;}
  @keyframes impactFlash{
    0%{opacity:.5; background:#ff6b8a33;}
    100%{opacity:0; background:#ff6b8a00;}
  }
  #app.shake{animation:appShake .35s ease-in-out;}
  @keyframes appShake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-4px);}
    40%{transform:translateX(4px);}
    60%{transform:translateX(-3px);}
    80%{transform:translateX(3px);}
  }

  .cg-result-stage{font-size:12px; color:var(--text-dim); margin-top:-6px;}

  /* ---------- 進化 ---------- */
  .cg-card.evolved-glow{border-width:3px; box-shadow:0 0 14px var(--gold-soft), 0 3px 10px #00000040 !important;}
  .cg-card-evolved-badge{position:absolute; bottom:2px; left:2px; font-size:11px; color:var(--gold-bright);
    text-shadow:0 0 4px #000, 0 0 2px #000; z-index:3;}
  .cg-card-evolved-badge.lg{font-size:22px; position:absolute; top:6px; left:6px;}
  .cg-evolved-tag{font-size:11px; color:var(--gold-bright); font-weight:700;}
  .cg-evolve-row{margin-top:10px;}
  .cg-evolve-btn{width:100%; background:linear-gradient(180deg,var(--purple),#6b4fae); color:#fff; border-color:var(--purple);}
  .cg-evolve-btn:disabled{opacity:.4; cursor:default;}
  .cg-evolve-done{font-size:12px; color:var(--gold-bright); text-align:center; padding:10px; background:var(--bg-panel2);
    border:1px solid var(--gold-bright); border-radius:12px;}
</style>
</head>
<body>
<div id="app">

  <!-- ============ ホーム画面 ============ -->
  <section id="screen-home" class="cg-screen cg-scroll-pad active">
    <div class="cg-topbar">
      <div class="cg-player-info">
        <div class="cg-avatar">🛡️</div>
        <div>
          <div class="cg-player-name" id="home-name">プレイヤー</div>
          <div class="cg-player-level" id="home-level">Lv.20</div>
        </div>
      </div>
      <div class="cg-currency-group">
        <div class="cg-currency">🏆 <span id="home-trophy">0</span></div>
        <div class="cg-currency">💎 <span id="home-gems">0</span></div>
        <div class="cg-currency">💰 <span id="home-gold">0</span></div>
      </div>
    </div>

    <div class="cg-hero">
      <div class="cg-hero-title cg-brand">LIS NOIR ― CARD BATTLE</div>
    </div>

    <div class="cg-progress-row">
      <div class="cg-progress-card">
        <div class="cg-progress-label"><span>デイリー報酬</span><span id="daily-label">0/0</span></div>
        <div class="cg-progress-track"><div class="cg-progress-fill" id="daily-fill"></div></div>
      </div>
      <div class="cg-progress-card">
        <div class="cg-progress-label"><span>勝利報酬</span><span id="win-label">0/0</span></div>
        <div class="cg-progress-track"><div class="cg-progress-fill cyan" id="win-fill"></div></div>
      </div>
    </div>
  </section>

  <!-- ============ カード画面（デッキ編成 / カード一覧 統合） ============ -->
  <section id="screen-collection" class="cg-screen cg-scroll-pad">
    <div class="cg-top-row">
      <button class="cg-back-btn cg-back-btn-collection">←</button>
      <div class="cg-segment">
        <button class="cg-seg-btn active" id="seg-deck">デッキ編成</button>
        <button class="cg-seg-btn" id="seg-list">カード一覧</button>
      </div>
    </div>

    <div id="collection-deck-view">
      <div class="cg-deck-header">
        <span class="cg-section-title" style="padding:0;">デッキ</span>
        <span style="font-size:12px; color:var(--text-dim);">枚数: <span id="deck-count">0/30</span> ／ 平均コスト: <span id="deck-avgcost">0</span></span>
      </div>
      <div id="deck-slots"></div>
      <div class="cg-section-title">カードコレクション（タップで追加/削除）</div>
      <div id="collection-list"></div>
    </div>

    <div id="collection-list-view" style="display:none;">
      <div class="cg-section-title">所持カード（タップで詳細）</div>
      <div id="cardlist-grid"></div>
    </div>
  </section>

  <!-- ============ カード詳細画面 ============ -->
  <section id="screen-card-detail" class="cg-screen">
    <div class="cg-top-row">
      <button class="cg-back-btn cg-back-btn-detail">←</button>
    </div>
    <div id="detail-body"></div>
  </section>

  <!-- ============ ステージ選択画面 ============ -->
  <section id="screen-stage" class="cg-screen cg-scroll-pad">
    <div class="cg-top-row">
      <button class="cg-back-btn cg-back-btn-stage">←</button>
      <span class="cg-section-title" style="padding:0;">ステージ選択</span>
    </div>
    <div id="stage-list" class="cg-stage-list"></div>
  </section>

  <!-- ============ バトル画面 ============ -->
  <section id="screen-battle" class="cg-screen">
    <div class="cg-battle-header">
      <div class="cg-battle-header-left">
        <button class="cg-back-btn cg-battle-back-btn" id="battle-back-btn" title="ホームへ戻る">←</button>
        <div id="battle-player-portrait" class="cg-mini-portrait"></div>
        <div class="cg-hp-chip">🛡️ <span class="val" id="battle-player-hp">30</span></div>
      </div>
      <div class="cg-timer" id="battle-turn-timer">ターン 1</div>
      <div class="cg-hp-chip">👹 <span class="val" id="battle-enemy-hp">30</span></div>
    </div>

    <div class="cg-battle-board">
      <div id="battle-impact-flash"></div>
      <div id="turn-banner"></div>
      <div id="battle-enemy-portrait"><span id="battle-enemy-emoji">👹</span><span id="battle-portrait-preview" class="cg-preview-badge"></span></div>
      <div id="battle-skill-flash"></div>
      <div class="cg-field-row" id="battle-enemy-field"></div>
      <div class="cg-battle-mid">カードをタップ→対象をタップ（攻撃／スペル／装備）</div>
      <div class="cg-field-row" id="battle-player-field"></div>
    </div>

    <div class="cg-hand-row" id="battle-hand"></div>

    <div class="cg-battle-footer">
      <span class="cg-cost-label">💧 コスト</span>
      <div class="cg-cost-track"><div class="cg-cost-fill" id="battle-cost-fill"></div></div>
      <span id="battle-cost-label" style="font-size:11px; color:var(--text-dim); margin-right:10px;"></span>
      <button class="cg-btn cg-btn-main" id="battle-end-turn">ターン終了</button>
    </div>

    <!-- VS 開幕演出 -->
    <div id="battle-vs-intro" class="cg-vs-intro hidden">
      <div class="cg-vs-side">
        <div class="cg-vs-portrait player">🛡️</div>
        <div class="cg-vs-name">プレイヤー</div>
      </div>
      <div class="cg-vs-mark">VS</div>
      <div class="cg-vs-side">
        <div id="vs-enemy-portrait" class="cg-vs-portrait enemy"></div>
        <div id="vs-enemy-name" class="cg-vs-name"></div>
      </div>
    </div>
  </section>

  <!-- ============ ショップ画面 ============ -->
  <section id="screen-shop" class="cg-screen cg-scroll-pad">
    <div class="cg-top-row">
      <button class="cg-back-btn cg-back-btn-shop">←</button>
      <span class="cg-section-title" style="padding:0;">ショップ</span>
    </div>
    <div class="cg-shop-currency">
      <span class="cg-currency">💰 <span id="shop-gold">0</span></span>
      <span class="cg-currency">💎 <span id="shop-gems">0</span></span>
    </div>
    <div id="shop-packs" class="cg-shop-packs"></div>
  </section>

  <!-- ============ パック開封演出 ============ -->
  <div id="shop-reveal-overlay" class="cg-reveal-overlay hidden">
    <div class="cg-reveal-inner">
      <div class="cg-reveal-label">獲得！</div>
      <div id="shop-reveal-card" class="cg-reveal-card"></div>
      <div id="shop-reveal-caption" class="cg-reveal-caption"></div>
      <button class="cg-btn cg-btn-main" id="shop-reveal-close">閉じる</button>
    </div>
  </div>

  <!-- ============ ミッション画面 ============ -->
  <section id="screen-mission" class="cg-screen cg-scroll-pad">
    <div class="cg-top-row">
      <button class="cg-back-btn cg-back-btn-mission">←</button>
      <span class="cg-section-title" style="padding:0;">ミッション</span>
    </div>
    <div id="mission-list" class="cg-mission-list"></div>
  </section>

  <!-- ============ ランクマッチ結果画面 ============ -->
  <section id="screen-result" class="cg-screen">
    <div class="cg-result-wrap">
      <div class="cg-result-title win" id="result-title">WIN</div>
      <div id="result-stage-name" class="cg-result-stage"></div>
      <div class="cg-result-trophy">🏆 <span id="result-trophy">0</span> (<span id="result-trophy-delta">+0</span>)</div>
      <div class="cg-reward-row">
        <div class="cg-reward-item">💰 ゴールド<span class="n" id="result-reward-gold">+0</span></div>
        <div class="cg-reward-item">💎 ジェム<span class="n" id="result-reward-gem">+0</span></div>
      </div>
      <div class="cg-result-actions">
        <button class="cg-btn" id="result-rematch">再戦</button>
        <button class="cg-btn cg-btn-main" id="result-home">ホームへ</button>
      </div>
    </div>
  </section>

  <!-- ============ 下部固定タブバー（モバイル向け） ============ -->
  <nav id="global-tabbar" class="cg-tabbar">
    <div class="cg-tab" id="nav-cards"><span class="ic">🃏</span><span class="lb">カード</span></div>
    <div class="cg-tab cg-tab-main" id="nav-battle"><span class="cg-tab-main-btn"><span class="ic">⚔️</span></span><span class="lb">バトル</span></div>
    <div class="cg-tab" id="nav-shop"><span class="ic">🏪</span><span class="lb">ショップ</span></div>
    <div class="cg-tab" id="nav-mission"><span class="ic">📜</span><span class="lb">ミッション</span></div>
  </nav>

</div>
<script src="cg-game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('Service Worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
